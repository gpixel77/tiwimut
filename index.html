<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Special for Bubub ❤️</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --pink-soft: #ffdde1;
        --pink-bright: #ffafbd;
        --text-color: #d63384;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(
          to bottom,
          var(--pink-bright),
          var(--pink-soft)
        );
        color: var(--text-color);

        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* COVER */
      #cover {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100dvh;
        background: white;
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: 1s;
        text-align: center;
        padding: 20px;
      }

      #cover h2 {
        font-family: "Pacifico", cursive;
        font-size: 1.5rem;
      }

      /* CONTAINER */
      #container {
        width: 90%;
        max-width: 420px;
        margin: auto;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        position: relative;
        z-index: 10;

        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .section {
        display: none;
        animation: fadeIn 0.8s ease-in-out;
      }

      .section.active {
        display: block;
      }

      /* GIF */
      .gif-container {
        width: 100%;
        max-width: 180px;
        margin: 0 auto 15px;
      }

      .gif-container img {
        width: 100%;
        border-radius: 15px;
      }

      h1 {
        font-family: "Pacifico", cursive;
        font-size: 1.5rem;
        margin-bottom: 15px;
      }

      p {
        font-weight: bold;
        line-height: 1.5;
        font-size: 0.95rem;
      }

      /* FOTO */
      .photo-container {
        width: 100%;
        aspect-ratio: 1 / 1;
        max-height: 260px;
        border-radius: 20px;
        overflow: hidden;
        border: 4px solid white;
        margin: 15px 0;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .photo-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.5s;
      }

      /* BUTTON */
      .btn-next {
        background-color: var(--text-color);
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 50px;
        cursor: pointer;
        margin: 15px auto 0;
        font-weight: bold;
        transition: 0.3s;
        font-size: 0.9rem;
        width: 100%;
        max-width: 220px;
      }

      .btn-next:hover {
        transform: scale(1.05);
        background-color: #b0246b;
      }

      /* HEART */
      .heart {
        position: fixed;
        color: #ff4d6d;
        font-size: 20px;
        z-index: 1;
        animation: fly 3s linear infinite;
        opacity: 0;
        pointer-events: none;
      }

      @keyframes fly {
        0% {
          transform: translateY(100dvh) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-10dvh) rotate(360deg);
          opacity: 0;
        }
      }

      /* ANIMASI */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* RESPONSIVE */
      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        h1 {
          font-size: 1.3rem;
        }

        p {
          font-size: 0.9rem;
        }
      }

      @media (max-width: 350px) {
        #container {
          padding: 15px;
        }

        h1 {
          font-size: 1.2rem;
        }

        p {
          font-size: 0.8rem;
        }

        .gif-container {
          max-width: 140px;
        }
      }
    </style>
  </head>

  <body>
    <!-- COVER -->
    <div id="cover">
      <img src="bu1.gif" style="width: 120px; margin-bottom: 20px" />
      <h2>Ada pesan buat Bubub...</h2>
      <button class="btn-next" onclick="bukaPesan()">Klik untuk Buka ❤️</button>
    </div>

    <!-- AUDIO -->
    <audio id="musik" loop>
      <source src="paper.mp3" type="audio/mpeg" />
    </audio>

    <!-- MAIN -->
    <div id="container">
      <div id="s1" class="section active">
        <div class="gif-container">
          <img src="bu1.gif" />
        </div>
        <h1>Hai Bubub Sayang! 👋</h1>
        <button class="btn-next" onclick="next(2)">Lanjut ya!</button>
      </div>

      <div id="s2" class="section">
        <div class="gif-container">
          <img src="bu2.gif" />
        </div>
        <h1>Gimana kabarnya?</h1>
        <p>Semoga selalu bahagia & ceria ya harinya..</p>
        <button class="btn-next" onclick="next(3)">Lanjut ❤️</button>
      </div>

      <div id="s3" class="section">
        <div class="gif-container">
          <img src="bu3.gif" />
        </div>
        <p>Pokoknya Bubub harus<br /><strong>Always Semangat! 🔥</strong></p>
        <button class="btn-next" onclick="next(4)">Coba liat ini..</button>
      </div>

      <div id="s4" class="section">
        <h1>Cantik Banget..</h1>
        <div class="photo-container">
          <img id="slideshow" src="1.jpeg" />
        </div>
        <p>Si kesayangan aku! 😍</p>
        <button class="btn-next" onclick="next(5)">Terakhir...</button>
      </div>

      <div id="s5" class="section">
        <div class="gif-container">
          <img src="bu4.gif" />
        </div>
        <h1>My Perfect Girl ❤️</h1>
        <p>I Love You More Than Anything! 💖</p>
      </div>
    </div>

    <script>
      function bukaPesan() {
        document.getElementById("cover").style.opacity = "0";
        setTimeout(() => {
          document.getElementById("cover").style.display = "none";
        }, 1000);

        document.getElementById("musik").play();
      }

      function next(num) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));

        document.getElementById("s" + num).classList.add("active");

        if (num === 4) startSlideshow();
      }

      const fotos = ["1.jpeg", "2.jpeg", "3.jpeg", "4.jpeg", "5.jpeg"];
      let i = 0;
      let intervalSlideshow;

      function startSlideshow() {
        const img = document.getElementById("slideshow");

        if (intervalSlideshow) clearInterval(intervalSlideshow);

        intervalSlideshow = setInterval(() => {
          i = (i + 1) % fotos.length;
          img.style.opacity = 0;

          setTimeout(() => {
            img.src = fotos[i];
            img.style.opacity = 1;
          }, 500);
        }, 3000);
      }

      function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = Math.random() * 2 + 3 + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 5000);
      }

      setInterval(createHeart, 300);
    </script>
  </body>
</html>
